spring.application.name=BFF
server.port=8080
eureka.client.enabled=false

resilience4j.circuitbreaker.instances.mascotasService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mascotasService.sliding-window-size=5
resilience4j.circuitbreaker.instances.mascotasService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.mascotasService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.mascotasService.permitted-number-of-calls-in-half-open-state=2

resilience4j.circuitbreaker.instances.reportesService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.reportesService.sliding-window-size=5
resilience4j.circuitbreaker.instances.reportesService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.reportesService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.reportesService.permitted-number-of-calls-in-half-open-state=2